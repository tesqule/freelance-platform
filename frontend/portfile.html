<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Профиль фрилансера — FreeLanceHub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css?v=20260305" />
  <style>
    .pub-hero { background:var(--card); border:1px solid var(--border); border-radius:var(--radius-xl); padding:2rem; margin-bottom:1.75rem; display:flex; gap:1.5rem; align-items:flex-start; flex-wrap:wrap; }
    .pub-avatar { width:88px; height:88px; border-radius:50%; object-fit:cover; flex-shrink:0; background:var(--surface2); display:flex; align-items:center; justify-content:center; font-size:2.2rem; font-weight:700; overflow:hidden; }
    .pub-avatar img { width:88px; height:88px; border-radius:50%; object-fit:cover; }
    .pub-info { flex:1; min-width:200px; }
    .pub-name { font-family:var(--font-display); font-size:1.6rem; font-weight:800; letter-spacing:-.04em; margin-bottom:.25rem; }
    .pub-role { font-size:.82rem; color:var(--text3); margin-bottom:.6rem; }
    .pub-bio { font-size:.875rem; color:var(--text2); line-height:1.7; margin-bottom:.75rem; }
    .pub-stats { display:flex; gap:1.5rem; flex-wrap:wrap; }
    .pub-stat { text-align:center; }
    .pub-stat-num { font-family:var(--font-display); font-size:1.3rem; font-weight:800; letter-spacing:-.04em; }
    .pub-stat-lbl { font-size:.72rem; color:var(--text3); margin-top:.1rem; }
    .pub-actions { display:flex; flex-direction:column; gap:.5rem; flex-shrink:0; }

    .pub-tabs { display:flex; gap:.3rem; margin-bottom:1.75rem; border-bottom:1px solid var(--border); }
    .pub-tab { padding:.6rem 1.1rem; font-size:.875rem; font-weight:600; color:var(--text2); cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-1px; transition:all .16s; background:none; border-top:none; border-left:none; border-right:none; font-family:var(--font-body); }
    .pub-tab:hover { color:var(--text); }
    .pub-tab.active { color:var(--blue-light); border-bottom-color:var(--blue); }

    .portfolio-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(240px,1fr)); gap:1rem; }
    .portfolio-card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius-lg); overflow:hidden; transition:all .22s; }
    .portfolio-card:hover { border-color:var(--border2); transform:translateY(-2px); box-shadow:0 10px 30px rgba(0,0,0,.3); }
    .portfolio-img { width:100%; height:150px; background:var(--bg3); display:flex; align-items:center; justify-content:center; font-size:2.5rem; overflow:hidden; }
    .portfolio-img img { width:100%; height:150px; object-fit:cover; }
    .portfolio-body { padding:1rem; }

    .services-grid-pub { display:grid; grid-template-columns:repeat(auto-fill, minmax(240px,1fr)); gap:1rem; }
    .svc-pub-card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius-lg); overflow:hidden; transition:all .22s; cursor:pointer; }
    .svc-pub-card:hover { border-color:var(--border2); transform:translateY(-2px); box-shadow:0 10px 30px rgba(0,0,0,.3); }
    .svc-pub-img { width:100%; height:150px; background:var(--bg3); display:flex; align-items:center; justify-content:center; font-size:2.5rem; overflow:hidden; position:relative; }
    .svc-pub-img img { width:100%; height:150px; object-fit:cover; }
    .svc-pub-body { padding:1rem; }
    .svc-pub-price { font-family:var(--font-display); font-size:1.15rem; font-weight:800; color:var(--green); letter-spacing:-.03em; margin:.35rem 0 .2rem; }

    .review-item { padding:1.1rem 0; border-bottom:1px solid var(--border); }
    .review-item:last-child { border-bottom:none; }

    @media (max-width:600px) {
      .pub-hero { flex-direction:column; }
      .pub-actions { flex-direction:row; }
      .portfolio-grid, .services-grid-pub { grid-template-columns:1fr; }
      .pub-tabs { overflow-x:auto; white-space:nowrap; }
    }
  </style>
</head>
<body>

  <div class="noise-overlay"></div>
  <div class="bg-canvas">
    <div class="bg-blob b1"></div>
    <div class="bg-blob b2"></div>
    <div class="bg-blob b3"></div>
    <div class="bg-blob b4"></div>
    <div class="bg-grid"></div>
  </div>

  <nav class="navbar" id="navbar">
    <a href="index.html" class="logo">
      <div class="logo-mark"><svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M10 2L17 6V14L10 18L3 14V6L10 2Z" stroke="white" stroke-width="1.5" stroke-linejoin="round"/><path d="M10 2V18M3 6L17 14M17 6L3 14" stroke="white" stroke-width="1" opacity="0.5"/></svg></div>
      <span class="logo-text">FreeLanceHub</span>
    </a>
    <ul class="nav-links">
      <li><a href="tasks.html" class="nav-link">Задания</a></li>
      <li><a href="index.html#freelancers" class="nav-link">Специалисты</a></li>
    </ul>
    <div class="nav-actions" id="navActions"></div>
    <button class="burger" id="burger" onclick="toggleMobileMenu()"><span></span><span></span><span></span></button>
  </nav>

  <div class="mobile-menu" id="mobileMenu">
    <div class="mobile-menu-inner">
      <a href="tasks.html" onclick="closeMobileMenu()">Задания</a>
      <a href="index.html#freelancers" onclick="closeMobileMenu()">Специалисты</a>
    </div>
  </div>

  <div class="page">
    <div class="container" style="padding-bottom:4rem;max-width:900px;">

      <!-- Кнопка назад -->
      <div style="margin:1.5rem 0 1rem;">
        <button class="btn btn-glass btn-sm" onclick="history.back()">← Назад</button>
      </div>

      <!-- Шапка профиля -->
      <div id="pubHero"><div class="spinner"></div></div>

      <!-- Вкладки -->
      <div class="pub-tabs" id="pubTabs" style="display:none;">
        <button class="pub-tab active" onclick="switchTab('portfolio', this)">🖼 Портфолио</button>
        <button class="pub-tab" onclick="switchTab('services', this)">🛠 Услуги</button>
        <button class="pub-tab" onclick="switchTab('reviews', this)">⭐ Отзывы</button>
      </div>

      <!-- TAB: ПОРТФОЛИО -->
      <div id="tab-portfolio">
        <div class="portfolio-grid" id="portfolioGrid"><div class="spinner"></div></div>
      </div>

      <!-- TAB: УСЛУГИ -->
      <div id="tab-services" style="display:none;">
        <div class="services-grid-pub" id="servicesGrid"><div class="spinner"></div></div>
      </div>

      <!-- TAB: ОТЗЫВЫ -->
      <div id="tab-reviews" style="display:none;">
        <div class="card" style="border-radius:var(--radius-lg);padding:1.75rem;">
          <div style="display:flex;align-items:center;gap:1.5rem;padding-bottom:1.25rem;border-bottom:1px solid var(--border);margin-bottom:1.25rem;">
            <div style="text-align:center;">
              <div style="font-family:var(--font-display);font-size:3rem;font-weight:800;letter-spacing:-.05em;line-height:1;color:var(--amber);" id="reviewAvgRating">—</div>
              <div style="font-size:1rem;color:var(--amber);margin:.2rem 0;" id="reviewStars">☆☆☆☆☆</div>
              <div style="font-size:.75rem;color:var(--text3);" id="reviewCount">нет отзывов</div>
            </div>
          </div>
          <div id="reviewsList"><div class="spinner"></div></div>
        </div>
      </div>

    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script src="js/app.js"></script>
  <script src="js/auth.js"></script>
  <script>
    const catEmojis = { development:'💻', design:'🎨', writing:'✍️', marketing:'📣', video:'🎬', music:'🎵', other:'🔧' };
    const catLabels = { development:'Разработка', design:'Дизайн', writing:'Тексты', marketing:'Маркетинг', video:'Видео', music:'Музыка', other:'Другое' };

    // ID фрилансера из URL (?id=...)
    const urlParams = new URLSearchParams(window.location.search);
    const freelancerId = urlParams.get('id');

    function toggleMobileMenu() { document.getElementById('mobileMenu').classList.toggle('open'); document.getElementById('burger').classList.toggle('open'); }
    function closeMobileMenu()  { document.getElementById('mobileMenu').classList.remove('open'); document.getElementById('burger').classList.remove('open'); }

    function switchTab(name, btn) {
      document.querySelectorAll('.pub-tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      ['portfolio','services','reviews'].forEach(t => {
        document.getElementById('tab-' + t).style.display = t === name ? 'block' : 'none';
      });
      if (name === 'portfolio') loadPortfolio();
      if (name === 'services')  loadServices();
      if (name === 'reviews')   loadReviews();
    }

    // ─── ШАПКА ПРОФИЛЯ ────────────────────────────────────────────────────────
    async function loadHero() {
      if (!freelancerId) {
        document.getElementById('pubHero').innerHTML = '<div class="empty-state"><div class="empty-icon">❌</div><h3>Профиль не найден</h3></div>';
        return;
      }
      try {
        const user = await api('/users/' + freelancerId);
        document.title = user.name + ' — FreeLanceHub';

        const currentUser = getCurrentUser();
        const isOwnProfile = currentUser && currentUser.id === freelancerId;

        document.getElementById('pubHero').innerHTML = `
          <div class="pub-hero">
            <div class="pub-avatar">
              ${user.avatar
                ? `<img src="${user.avatar}" alt="${user.name}">`
                : user.name.charAt(0)}
            </div>
            <div class="pub-info">
              <div class="pub-name">${user.name}</div>
              <div class="pub-role">${user.specialization || (user.skills?.slice(0,2).join(' · ') || 'Фрилансер')}</div>
              ${user.bio ? `<div class="pub-bio">${user.bio}</div>` : ''}
              ${user.skills?.length
                ? `<div style="display:flex;flex-wrap:wrap;gap:.35rem;margin-bottom:.75rem;">
                     ${user.skills.map(s => `<span class="skill-tag">${s}</span>`).join('')}
                   </div>`
                : ''}
              <div class="pub-stats">
                <div class="pub-stat">
                  <div class="pub-stat-num" style="color:var(--amber);">★ ${(user.rating||0).toFixed(1)}</div>
                  <div class="pub-stat-lbl">Рейтинг</div>
                </div>
                <div class="pub-stat">
                  <div class="pub-stat-num">${user.completedTasks||0}</div>
                  <div class="pub-stat-lbl">Выполнено</div>
                </div>
              </div>
            </div>
            <div class="pub-actions">
              ${isOwnProfile
                ? `<a href="profile.html" class="btn btn-primary btn-sm">✏️ Редактировать</a>`
                : `<a href="chat.html?user=${user._id}" class="btn btn-primary btn-sm">💬 Написать</a>`}
            </div>
          </div>`;

        document.getElementById('pubTabs').style.display = 'flex';
        loadPortfolio();
      } catch(e) {
        document.getElementById('pubHero').innerHTML = '<div class="empty-state"><div class="empty-icon">❌</div><h3>Пользователь не найден</h3></div>';
      }
    }

    // ─── ПОРТФОЛИО ────────────────────────────────────────────────────────────
    async function loadPortfolio() {
      const grid = document.getElementById('portfolioGrid');
      grid.innerHTML = '<div class="spinner"></div>';
      try {
        const items = await api('/portfolio/' + freelancerId);
        if (!items.length) {
          grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
            <div class="empty-icon">🖼</div>
            <h3>Портфолио пусто</h3>
            <p>Фрилансер ещё не добавил работы</p>
          </div>`;
          return;
        }
        grid.innerHTML = items.map(item => `
          <div class="portfolio-card">
            <div class="portfolio-img">
              ${item.imageUrl
                ? `<img src="${item.imageUrl}" alt="${item.title}" onerror="this.parentElement.innerHTML='${catEmojis[item.category]||'🔧'}';">`
                : catEmojis[item.category]||'🔧'}
            </div>
            <div class="portfolio-body">
              <div style="font-weight:700;font-size:.95rem;margin-bottom:.3rem;">${item.title}</div>
              ${item.description
                ? `<div style="font-size:.8rem;color:var(--text2);line-height:1.6;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;">${item.description}</div>`
                : ''}
              ${item.skills?.length
                ? `<div style="display:flex;flex-wrap:wrap;gap:.3rem;margin-top:.6rem;">
                     ${item.skills.slice(0,3).map(s=>`<span class="skill-tag">${s}</span>`).join('')}
                   </div>`
                : ''}
              ${item.projectUrl
                ? `<div style="margin-top:.75rem;"><a href="${item.projectUrl}" target="_blank" class="btn btn-glass btn-sm">🔗 Открыть проект</a></div>`
                : ''}
            </div>
          </div>`).join('');
      } catch(e) {
        grid.innerHTML = '<p style="color:var(--text2);grid-column:1/-1;">Ошибка загрузки</p>';
      }
    }

    // ─── УСЛУГИ ───────────────────────────────────────────────────────────────
    async function loadServices() {
      const grid = document.getElementById('servicesGrid');
      grid.innerHTML = '<div class="spinner"></div>';
      try {
        const services = await api('/services?freelancer=' + freelancerId);
        if (!services.length) {
          grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
            <div class="empty-icon">🛠</div>
            <h3>Услуг пока нет</h3>
            <p>Фрилансер ещё не добавил услуги</p>
          </div>`;
          return;
        }
        grid.innerHTML = services.map(s => `
          <div class="svc-pub-card" onclick="openSvcModal('${s._id}')">
            <div class="svc-pub-img">
              ${s.imageUrl
                ? `<img src="${s.imageUrl}" alt="${s.title}" style="width:100%;height:150px;object-fit:cover;" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">
                   <span style="display:none;font-size:2.5rem;position:absolute;inset:0;align-items:center;justify-content:center;background:var(--bg3);">${catEmojis[s.category]||'🔧'}</span>`
                : `<span style="font-size:2.5rem;">${catEmojis[s.category]||'🔧'}</span>`}
              <span style="position:absolute;top:.5rem;left:.5rem;background:var(--surface2);border:1px solid var(--border);border-radius:99px;padding:.2rem .6rem;font-size:.7rem;color:var(--text2);">
                ${catLabels[s.category]||'Другое'}
              </span>
            </div>
            <div class="svc-pub-body">
              <div style="font-weight:700;font-size:.95rem;">${s.title}</div>
              ${s.description
                ? `<div style="font-size:.8rem;color:var(--text2);line-height:1.6;margin-top:.3rem;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;">${s.description}</div>`
                : ''}
              <div class="svc-pub-price">₽${(s.price||0).toLocaleString('ru')}</div>
              <div style="font-size:.72rem;color:var(--text3);">⏱ ${s.deliveryDays||1} дн.</div>
              ${s.skills?.length
                ? `<div style="display:flex;flex-wrap:wrap;gap:.3rem;margin-top:.5rem;">
                     ${s.skills.slice(0,3).map(sk=>`<span class="skill-tag">${sk}</span>`).join('')}
                   </div>`
                : ''}
              <button class="btn btn-primary btn-sm w-full" style="margin-top:.75rem;" onclick="event.stopPropagation(); goChat()">
                💬 Написать
              </button>
            </div>
          </div>`).join('');
      } catch(e) {
        grid.innerHTML = '<p style="color:var(--text2);grid-column:1/-1;">Ошибка загрузки</p>';
      }
    }

    function goChat() {
      const user = getCurrentUser();
      if (!user) { window.location.href = 'index.html'; return; }
      window.location.href = 'chat.html?user=' + freelancerId;
    }

    // ─── ОТЗЫВЫ ───────────────────────────────────────────────────────────────
    async function loadReviews() {
      try {
        const reviews = await api('/reviews/user/' + freelancerId);
        if (!reviews.length) {
          document.getElementById('reviewAvgRating').textContent = '—';
          document.getElementById('reviewStars').textContent = '☆☆☆☆☆';
          document.getElementById('reviewCount').textContent = 'нет отзывов';
          document.getElementById('reviewsList').innerHTML = `<div class="empty-state" style="padding:2rem 0;">
            <div class="empty-icon">⭐</div><p>У фрилансера пока нет отзывов</p></div>`;
          return;
        }
        const avg = reviews.reduce((s,r) => s + r.rating, 0) / reviews.length;
        document.getElementById('reviewAvgRating').textContent = avg.toFixed(1);
        document.getElementById('reviewStars').innerHTML =
          `<span style="color:var(--amber)">${'★'.repeat(Math.round(avg))}</span>` +
          `<span style="color:var(--text3)">${'★'.repeat(5-Math.round(avg))}</span>`;
        document.getElementById('reviewCount').textContent =
          `${reviews.length} отзыв${reviews.length===1?'':reviews.length<5?'а':'ов'}`;
        document.getElementById('reviewsList').innerHTML = reviews.map(r => `
          <div class="review-item">
            <div style="display:flex;gap:.75rem;">
              <div class="avatar" style="width:38px;height:38px;font-size:.9rem;flex-shrink:0;">
                ${r.reviewer?.avatar
                  ? `<img src="${r.reviewer.avatar}" style="width:38px;height:38px;border-radius:50%;object-fit:cover;">`
                  : (r.reviewer?.name||'?').charAt(0)}
              </div>
              <div style="flex:1;">
                <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:.5rem;margin-bottom:.25rem;">
                  <div style="font-weight:700;font-size:.9rem;">${r.reviewer?.name||'Пользователь'}</div>
                  <div style="color:var(--amber);font-size:.9rem;">${'★'.repeat(r.rating)}${'☆'.repeat(5-r.rating)}</div>
                </div>
                ${r.task?.title ? `<div style="font-size:.74rem;color:var(--text3);margin-bottom:.35rem;">📋 ${r.task.title}</div>` : ''}
                ${r.comment ? `<p style="font-size:.875rem;color:var(--text2);line-height:1.65;margin:0;">${r.comment}</p>` : ''}
                <div style="font-size:.72rem;color:var(--text3);margin-top:.35rem;">${formatRelDate(r.createdAt)}</div>
              </div>
            </div>
          </div>`).join('');
      } catch(e) {
        document.getElementById('reviewsList').innerHTML = '<p style="color:var(--text2);">Ошибка загрузки</p>';
      }
    }

    // ─── ПРОСТАЯ МОДАЛКА УСЛУГИ (без allServices) ─────────────────────────────
    let pubServices = [];
    async function openSvcModal(id) {
      if (!pubServices.length) {
        try { pubServices = await api('/services?freelancer=' + freelancerId); } catch(e) { return; }
      }
      const s = pubServices.find(x => x._id === id);
      if (!s) return;
      // Переиспользуем serviceViewModal если он есть, иначе просто идём в чат
      goChat();
    }

    function formatRelDate(iso) {
      const days = Math.floor((Date.now() - new Date(iso).getTime()) / 86400000);
      if (days === 0) return 'Сегодня';
      if (days === 1) return 'Вчера';
      if (days < 7)  return `${days} дн. назад`;
      return new Date(iso).toLocaleDateString('ru-RU');
    }

    // ─── INIT ─────────────────────────────────────────────────────────────────
    document.addEventListener('DOMContentLoaded', () => {
      updateNavForAuth();
      loadHero();
      window.addEventListener('scroll', () => {
        document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 20);
      });
    });
  </script>
</body>
</html>
