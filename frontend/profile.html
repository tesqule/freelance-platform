<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Профиль — FreeLanceHub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div class="noise-overlay"></div>
  <div class="bg-canvas">
    <div class="bg-blob b1"></div>
    <div class="bg-blob b2"></div>
    <div class="bg-grid"></div>
  </div>

  <nav class="navbar" id="navbar">
    <a href="index.html" class="logo">
      <div class="logo-mark">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M10 2L17 6V14L10 18L3 14V6L10 2Z" stroke="white" stroke-width="1.5" stroke-linejoin="round"/><path d="M10 2V18M3 6L17 14M17 6L3 14" stroke="white" stroke-width="1" opacity="0.5"/></svg>
      </div>
      <span class="logo-text">FreeLanceHub</span>
    </a>
    <ul class="nav-links">
      <li><a href="tasks.html" class="nav-link">Задания</a></li>
      <li><a href="dashboard.html" class="nav-link">Дашборд</a></li>
      <li><a href="chat.html" class="nav-link">Сообщения</a></li>
    </ul>
    <div class="nav-actions" id="navActions"></div>
    <button class="burger" id="burger" onclick="toggleMobileMenu()"><span></span><span></span><span></span></button>
  </nav>

  <div class="mobile-menu" id="mobileMenu">
    <div class="mobile-menu-inner">
      <a href="tasks.html" onclick="closeMobileMenu()">Задания</a>
      <a href="dashboard.html" onclick="closeMobileMenu()">Дашборд</a>
      <a href="chat.html" onclick="closeMobileMenu()">Сообщения</a>
    </div>
  </div>

  <div class="page">
    <div class="container" style="padding-bottom:4rem;max-width:820px;">

      <div style="margin:2rem 0 1.5rem;">
        <div class="section-eyebrow">Аккаунт</div>
        <h2 style="font-size:1.8rem;letter-spacing:-.04em;">Мой профиль</h2>
      </div>

      <!-- PROFILE HEADER -->
      <div id="profileHeader" style="margin-bottom:1.5rem;">
        <div class="spinner"></div>
      </div>

      <!-- EDIT FORM -->
      <div class="card" style="border-radius:var(--radius-lg);padding:2rem;">
        <h3 style="font-size:1.05rem;letter-spacing:-.02em;margin-bottom:1.75rem;">Редактировать профиль</h3>

        <div class="grid-2" style="gap:1rem;">
          <div class="form-group" style="margin-bottom:0;">
            <label>Имя</label>
            <input type="text" class="form-control" id="editName" />
          </div>
          <div class="form-group" style="margin-bottom:0;">
            <label>URL аватара</label>
            <input type="text" class="form-control" id="editAvatar" placeholder="https://example.com/photo.jpg" />
          </div>
        </div>

        <div class="form-group mt-2">
          <label>О себе</label>
          <textarea class="form-control" id="editBio" placeholder="Расскажите о себе, своём опыте и навыках..." style="min-height:115px;"></textarea>
        </div>

        <div class="form-group">
          <label>Навыки (через запятую)</label>
          <input type="text" class="form-control" id="editSkills" placeholder="React, Node.js, Figma..." />
          <div style="font-size:.75rem;color:var(--text3);margin-top:.4rem;">Укажи свои навыки чтобы заказчики могли тебя найти</div>
        </div>

        <!-- Skills preview -->
        <div id="skillsPreview" style="display:flex;flex-wrap:wrap;gap:.4rem;margin-bottom:1.25rem;"></div>

        <button class="btn btn-primary" onclick="saveProfile()">Сохранить изменения</button>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script src="js/app.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/profile.js"></script>
  <script>
    function toggleMobileMenu() {
      document.getElementById('mobileMenu').classList.toggle('open');
      document.getElementById('burger').classList.toggle('open');
    }
    function closeMobileMenu() {
      document.getElementById('mobileMenu').classList.remove('open');
      document.getElementById('burger').classList.remove('open');
    }

    function openAuthModal() { window.location.href = 'index.html'; }

    // Live skills preview
    document.addEventListener('DOMContentLoaded', () => {
      updateNavForAuth();
      loadProfile();

      document.getElementById('editSkills')?.addEventListener('input', function() {
        const preview = document.getElementById('skillsPreview');
        const skills = this.value.split(',').map(s => s.trim()).filter(Boolean);
        preview.innerHTML = skills.map(s => `<span class="skill-tag">${s}</span>`).join('');
      });

      window.addEventListener('scroll', () => {
        document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 20);
      });
    });
  </script>
</body>
</html>
