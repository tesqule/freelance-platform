<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Профиль — FreeLanceHub</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <nav class="navbar">
    <a href="index.html" class="logo">⚡ FreeLanceHub</a>
    <ul class="nav-links">
      <li><a href="tasks.html">Задания</a></li>
      <li><a href="dashboard.html">Дашборд</a></li>
      <li><a href="chat.html">Сообщения</a></li>
    </ul>
    <div class="nav-actions" id="navActions"></div>
  </nav>

  <div class="page">
    <div class="container" style="padding-bottom:4rem; max-width:800px;">
      <h2 class="mt-3 mb-3">Мой профиль</h2>

      <div class="profile-header mb-3" id="profileHeader">
        <div class="spinner"></div>
      </div>

      <!-- EDIT FORM -->
      <div class="card">
        <h3 style="margin-bottom:1.5rem;">Редактировать профиль</h3>
        <div class="form-group">
          <label>Имя</label>
          <input type="text" class="form-control" id="editName" />
        </div>
        <div class="form-group">
          <label>О себе</label>
          <textarea class="form-control" id="editBio" placeholder="Расскажите о себе, своём опыте и навыках..." style="min-height:120px;"></textarea>
        </div>
        <div class="form-group">
          <label>Навыки (через запятую)</label>
          <input type="text" class="form-control" id="editSkills" placeholder="React, Node.js, Figma..." />
        </div>
        <div class="form-group">
          <label>URL аватара</label>
          <input type="text" class="form-control" id="editAvatar" placeholder="https://example.com/photo.jpg" />
        </div>
        <button class="btn btn-primary" onclick="saveProfile()">Сохранить изменения</button>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script src="js/app.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/profile.js"></script>
  <script>

function openAuthModal(type) {
  window.location.href = 'index.html';
}

    document.addEventListener('DOMContentLoaded', () => {
      updateNavForAuth();
      loadProfile();
    });
  </script>
</body>
</html>
