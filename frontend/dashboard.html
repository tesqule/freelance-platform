<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Дашборд — FreeLanceHub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div class="noise-overlay"></div>
  <div class="bg-canvas">
    <div class="bg-blob b1"></div>
    <div class="bg-blob b2"></div>
    <div class="bg-blob b3"></div>
    <div class="bg-blob b4"></div>
    <div class="bg-grid"></div>
  </div>

  <nav class="navbar" id="navbar">
    <a href="index.html" class="logo">
      <div class="logo-mark">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M10 2L17 6V14L10 18L3 14V6L10 2Z" stroke="white" stroke-width="1.5" stroke-linejoin="round"/><path d="M10 2V18M3 6L17 14M17 6L3 14" stroke="white" stroke-width="1" opacity="0.5"/></svg>
      </div>
      <span class="logo-text">FreeLanceHub</span>
    </a>
    <ul class="nav-links">
      <li><a href="tasks.html" class="nav-link">Задания</a></li>
      <li><a href="dashboard.html" class="nav-link active">Дашборд</a></li>
      <li><a href="chat.html" class="nav-link">Сообщения</a></li>
    </ul>
    <div class="nav-actions" id="navActions"></div>
    <button class="burger" id="burger" onclick="toggleMobileMenu()"><span></span><span></span><span></span></button>
  </nav>

  <div class="mobile-menu" id="mobileMenu">
    <div class="mobile-menu-inner">
      <a href="tasks.html" onclick="closeMobileMenu()">Задания</a>
      <a href="dashboard.html" onclick="closeMobileMenu()">Дашборд</a>
      <a href="chat.html" onclick="closeMobileMenu()">Сообщения</a>
    </div>
  </div>

  <div class="page">
    <div class="container" style="padding-bottom:4rem;">
      <div class="dashboard-grid mt-3">

        <!-- SIDEBAR -->
        <aside class="sidebar">
          <div class="card mb-2" id="sidebarProfile" style="text-align:center; padding:1.75rem 1.25rem;">
            <div class="avatar" id="sidebarAvatar" style="width:76px;height:76px;font-size:1.9rem;margin:0 auto 0.9rem; box-shadow:0 4px 20px rgba(79,110,247,0.35);"></div>
            <div style="font-family:var(--font-display);font-weight:700;font-size:1.05rem;" id="sidebarName">Загрузка...</div>
            <div class="text-sm" style="color:var(--text3);margin-top:.25rem;" id="sidebarEmail"></div>
            <div id="sidebarRole" style="margin-top:.6rem;"></div>
            <div style="margin-top:.9rem;padding-top:.9rem;border-top:1px solid var(--border);">
              <div style="font-size:.72rem;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.25rem;">Баланс</div>
              <div style="font-family:var(--font-display);font-size:1.5rem;font-weight:800;color:var(--green);" id="sidebarBalance">₽0</div>
            </div>
          </div>

          <nav class="card" style="padding:.5rem;">
            <ul class="sidebar-nav">
              <li><a href="#overview" class="active" onclick="showTab('overview',this)"><span class="icon">🏠</span>Обзор</a></li>
              <li><a href="#tasks" onclick="showTab('tasks',this)"><span class="icon">📋</span>Мои задания</a></li>
              <li><a href="chat.html"><span class="icon">💬</span>Сообщения</a></li>
              <li><a href="profile.html"><span class="icon">👤</span>Профиль</a></li>
              <li><a href="tasks.html"><span class="icon">🔍</span>Найти задания</a></li>
              <li style="border-top:1px solid var(--border);padding-top:.5rem;margin-top:.5rem;">
                <a href="#" onclick="logout()" style="color:var(--red)!important;"><span class="icon">🚪</span>Выйти</a>
              </li>
            </ul>
          </nav>
        </aside>

        <!-- MAIN -->
        <main>
          <div id="tab-overview">
            <div style="margin-bottom:2rem;">
              <div class="section-eyebrow">Дашборд</div>
              <h2 style="font-size:1.6rem;letter-spacing:-.035em;" id="welcomeTitle">Добро пожаловать 👋</h2>
            </div>
            <div class="grid-3 mb-3" id="statsCards" style="gap:.85rem;"></div>
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;">
              <h3 style="font-size:1.05rem;letter-spacing:-.02em;">Последняя активность</h3>
            </div>
            <div id="recentActivity"></div>
          </div>

          <div id="tab-tasks" class="hidden">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;">
              <h3 style="font-size:1.3rem;letter-spacing:-.03em;" id="tasksTabTitle">Мои задания</h3>
              <button class="btn btn-primary btn-sm" id="addTaskBtn" onclick="window.location.href='tasks.html?action=create'" style="display:none;">+ Разместить</button>
            </div>
            <div id="myTasksList"></div>
          </div>
        </main>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script src="js/app.js"></script>
  <script src="js/auth.js"></script>
  <script>
    function toggleMobileMenu() {
      document.getElementById('mobileMenu').classList.toggle('open');
      document.getElementById('burger').classList.toggle('open');
    }
    function closeMobileMenu() {
      document.getElementById('mobileMenu').classList.remove('open');
      document.getElementById('burger').classList.remove('open');
    }

    function showTab(tab, el) {
      document.querySelectorAll('.sidebar-nav a').forEach(a => a.classList.remove('active'));
      if (el) el.classList.add('active');
      document.getElementById('tab-overview').classList.toggle('hidden', tab !== 'overview');
      document.getElementById('tab-tasks').classList.toggle('hidden', tab !== 'tasks');
      if (tab === 'tasks') loadMyTasks();
    }

    async function loadDashboard() {
      const user = getCurrentUser();
      if (!user) { window.location.href = 'index.html'; return; }

      document.getElementById('welcomeTitle').textContent = `Привет, ${user.name.split(' ')[0]} 👋`;

      const av = document.getElementById('sidebarAvatar');
      av.innerHTML = user.avatar
        ? `<img src="${user.avatar}" style="width:76px;height:76px;border-radius:50%;object-fit:cover;">`
        : user.name.charAt(0);
      document.getElementById('sidebarName').textContent = user.name;
      document.getElementById('sidebarEmail').textContent = user.email || '';
      document.getElementById('sidebarBalance').textContent = `₽${(user.balance||0).toLocaleString()}`;
      document.getElementById('sidebarRole').innerHTML =
        `<span class="profile-role">${user.role === 'client' ? '📋 Заказчик' : '💼 Фрилансер'}</span>`;

      if (user.role === 'client') document.getElementById('addTaskBtn').style.display = 'flex';

      try {
        const tasks = await apiAuth('/tasks/my/tasks');
        const open = tasks.filter(t => t.status === 'open').length;
        const inProgress = tasks.filter(t => t.status === 'in_progress').length;
        const completed = tasks.filter(t => t.status === 'completed').length;

        document.getElementById('statsCards').innerHTML = `
          <div class="card" style="text-align:center;padding:1.5rem 1rem;border-color:rgba(16,217,138,.15);">
            <div style="font-size:2.2rem;font-weight:800;font-family:var(--font-display);color:var(--green);letter-spacing:-.04em;">${open}</div>
            <div style="font-size:.72rem;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-top:.35rem;">${user.role === 'client' ? 'Открытых' : 'Доступных'}</div>
          </div>
          <div class="card" style="text-align:center;padding:1.5rem 1rem;border-color:rgba(245,158,11,.15);">
            <div style="font-size:2.2rem;font-weight:800;font-family:var(--font-display);color:var(--amber);letter-spacing:-.04em;">${inProgress}</div>
            <div style="font-size:.72rem;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-top:.35rem;">В работе</div>
          </div>
          <div class="card" style="text-align:center;padding:1.5rem 1rem;border-color:rgba(79,110,247,.15);">
            <div style="font-size:2.2rem;font-weight:800;font-family:var(--font-display);color:var(--blue-light);letter-spacing:-.04em;">${completed}</div>
            <div style="font-size:.72rem;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-top:.35rem;">Выполнено</div>
          </div>`;

        const recent = [...tasks].sort((a,b) => new Date(b.createdAt)-new Date(a.createdAt)).slice(0,5);
        document.getElementById('recentActivity').innerHTML = recent.length
          ? recent.map(t => `
            <div class="card mb-1" style="padding:1rem 1.25rem;cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:1rem;transition:all .2s;" onclick="window.location.href='task-detail.html?id=${t._id}'"
              onmouseover="this.style.borderColor='var(--border2)'" onmouseout="this.style.borderColor=''">
              <div>
                <div style="font-weight:600;font-size:.9rem;">${t.title}</div>
                <div style="font-size:.78rem;color:var(--text3);margin-top:.2rem;">₽${t.budget.toLocaleString()}</div>
              </div>
              <span class="badge badge-${t.status}">${statusLabel(t.status)}</span>
            </div>`).join('')
          : `<div class="empty-state"><div class="empty-icon">📭</div><h3>Заданий пока нет</h3>
             <a href="tasks.html" class="btn btn-primary mt-2">Найти задание</a></div>`;
      } catch(e) {}
    }

    async function loadMyTasks() {
      const listEl = document.getElementById('myTasksList');
      listEl.innerHTML = '<div class="spinner"></div>';
      try {
        const tasks = await apiAuth('/tasks/my/tasks');
        const user = getCurrentUser();
        listEl.innerHTML = tasks.length
          ? tasks.map(t => `
            <div class="task-card mb-2" onclick="window.location.href='task-detail.html?id=${t._id}'">
              <div class="task-card-header">
                <h3>${t.title}</h3>
                <span class="task-budget">₽${t.budget.toLocaleString()}</span>
              </div>
              <p class="task-desc">${t.description}</p>
              <div class="flex gap-1 mt-2" style="flex-wrap:wrap;">
                <span class="badge badge-${t.status}">${statusLabel(t.status)}</span>
                <span class="badge badge-${t.category}">${t.category}</span>
              </div>
              ${t.assignedTo ? `<div class="text-sm" style="color:var(--text3);margin-top:.6rem;">👤 Исполнитель: ${t.assignedTo.name}</div>` : ''}
              ${t.client ? `<div class="text-sm" style="color:var(--text3);margin-top:.6rem;">📋 Заказчик: ${t.client.name}</div>` : ''}
            </div>`).join('')
          : `<div class="empty-state"><div class="empty-icon">📋</div><h3>Заданий пока нет</h3>
             <a href="tasks.html" class="btn btn-primary mt-2">Найти задание</a></div>`;
      } catch(e) {}
    }

    function statusLabel(s) {
      return { open:'Открыто', in_progress:'В работе', completed:'Выполнено', cancelled:'Отменено' }[s] || s;
    }

    function openAuthModal() { window.location.href = 'index.html'; }

    document.addEventListener('DOMContentLoaded', () => {
      updateNavForAuth();
      loadDashboard();
      window.addEventListener('scroll', () => {
        document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 20);
      });
    });
  </script>
</body>
</html>
