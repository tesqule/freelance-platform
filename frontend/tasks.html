<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Задания — FreeLanceHub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div class="noise-overlay"></div>
  <div class="bg-canvas">
    <div class="bg-blob b1"></div>
    <div class="bg-blob b2"></div>
    <div class="bg-grid"></div>
  </div>

  <nav class="navbar" id="navbar">
    <a href="index.html" class="logo">
      <div class="logo-mark">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M10 2L17 6V14L10 18L3 14V6L10 2Z" stroke="white" stroke-width="1.5" stroke-linejoin="round"/><path d="M10 2V18M3 6L17 14M17 6L3 14" stroke="white" stroke-width="1" opacity="0.5"/></svg>
      </div>
      <span class="logo-text">FreeLanceHub</span>
    </a>
    <ul class="nav-links">
      <li><a href="tasks.html" class="nav-link active">Задания</a></li>
      <li><a href="dashboard.html" class="nav-link">Дашборд</a></li>
      <li><a href="chat.html" class="nav-link">Сообщения</a></li>
    </ul>
    <div class="nav-actions" id="navActions"></div>
    <button class="burger" id="burger" onclick="toggleMobileMenu()"><span></span><span></span><span></span></button>
  </nav>

  <div class="mobile-menu" id="mobileMenu">
    <div class="mobile-menu-inner">
      <a href="tasks.html" onclick="closeMobileMenu()">Задания</a>
      <a href="dashboard.html" onclick="closeMobileMenu()">Дашборд</a>
      <a href="chat.html" onclick="closeMobileMenu()">Сообщения</a>
    </div>
  </div>

  <div class="page" style="padding-bottom:4rem;">
    <div class="container mt-3">

      <!-- PAGE HEADER -->
      <div style="margin-bottom:2rem;">
        <div class="section-eyebrow">Биржа</div>
        <div style="display:flex;justify-content:space-between;align-items:flex-end;gap:1rem;flex-wrap:wrap;">
          <h2 style="font-size:1.8rem;letter-spacing:-.04em;">Все задания</h2>
          <button class="btn btn-primary" id="createTaskBtn" onclick="openCreateTask()" style="display:none;">
            + Разместить задание
          </button>
        </div>
      </div>

      <!-- FILTERS -->
      <div class="filters-bar" style="flex-wrap:wrap;gap:.6rem;">
        <div class="search-bar" style="min-width:220px;">
          <input type="text" id="searchInput" placeholder="Поиск заданий..." oninput="filterTasks()" />
        </div>
        <div style="display:flex;gap:.4rem;flex-wrap:wrap;">
          <button class="filter-btn active" onclick="setCategoryFilter('',this)">Все</button>
          <button class="filter-btn" onclick="setCategoryFilter('development',this)">💻 Dev</button>
          <button class="filter-btn" onclick="setCategoryFilter('design',this)">🎨 Дизайн</button>
          <button class="filter-btn" onclick="setCategoryFilter('writing',this)">✍️ Тексты</button>
          <button class="filter-btn" onclick="setCategoryFilter('marketing',this)">📣 Маркетинг</button>
          <button class="filter-btn" onclick="setCategoryFilter('video',this)">🎬 Видео</button>
          <button class="filter-btn" onclick="setCategoryFilter('other',this)">🔧 Другое</button>
        </div>
      </div>

      <!-- BUDGET + SORT ROW -->
      <div style="display:flex;gap:.75rem;margin-bottom:1.5rem;flex-wrap:wrap;align-items:center;">
        <div style="display:flex;align-items:center;gap:.5rem;">
          <span style="font-size:.8rem;color:var(--text3);white-space:nowrap;">Бюджет:</span>
          <input type="number" class="form-control" id="minBudget" placeholder="От ₽" style="width:88px;padding:.45rem .75rem;font-size:.82rem;" oninput="filterTasks()" />
          <span style="color:var(--text3);">—</span>
          <input type="number" class="form-control" id="maxBudget" placeholder="До ₽" style="width:88px;padding:.45rem .75rem;font-size:.82rem;" oninput="filterTasks()" />
        </div>
        <select class="form-control" id="sortSelect" style="width:190px;padding:.45rem .75rem;font-size:.82rem;" onchange="filterTasks()">
          <option value="newest">Сначала новые</option>
          <option value="budget_high">Бюджет: высокий → низкий</option>
          <option value="budget_low">Бюджет: низкий → высокий</option>
        </select>
        <div style="margin-left:auto;font-size:.8rem;color:var(--text3);" id="resultsCount"></div>
      </div>

      <div class="tasks-grid" id="tasksGrid">
        <div class="spinner"></div>
      </div>
    </div>
  </div>

  <!-- CREATE TASK MODAL -->
  <div class="modal-overlay" id="createTaskModal">
    <div class="modal" style="max-width:600px;">
      <div class="modal-header">
        <h3>Новое задание</h3>
        <button class="modal-close" onclick="closeModal('createTaskModal')">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="form-group">
        <label>Название задания *</label>
        <input type="text" class="form-control" id="taskTitle" placeholder="Например: Разработка лендинга на React" />
      </div>
      <div class="form-group">
        <label>Категория *</label>
        <select class="form-control" id="taskCategory">
          <option value="">Выберите категорию</option>
          <option value="development">💻 Разработка</option>
          <option value="design">🎨 Дизайн</option>
          <option value="writing">✍️ Копирайтинг</option>
          <option value="marketing">📣 Маркетинг</option>
          <option value="video">🎬 Видео</option>
          <option value="music">🎵 Музыка</option>
          <option value="other">🔧 Другое</option>
        </select>
      </div>
      <div class="form-group">
        <label>Описание задания *</label>
        <textarea class="form-control" id="taskDesc" placeholder="Подробно опишите что нужно сделать..." style="min-height:130px;"></textarea>
      </div>
      <div class="grid-2">
        <div class="form-group">
          <label>Бюджет (₽) *</label>
          <input type="number" class="form-control" id="taskBudget" placeholder="5000" />
        </div>
        <div class="form-group">
          <label>Дедлайн *</label>
          <input type="date" class="form-control" id="taskDeadline" />
        </div>
      </div>
      <div class="form-group">
        <label>Навыки (через запятую)</label>
        <input type="text" class="form-control" id="taskSkills" placeholder="React, Node.js, MongoDB" />
      </div>
      <button class="btn btn-primary w-full" onclick="createTask()">Разместить задание 🚀</button>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script src="js/app.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/tasks.js"></script>
  <script>
    let allTasks = [];
    let currentCategory = '';

    function toggleMobileMenu() {
      document.getElementById('mobileMenu').classList.toggle('open');
      document.getElementById('burger').classList.toggle('open');
    }
    function closeMobileMenu() {
      document.getElementById('mobileMenu').classList.remove('open');
      document.getElementById('burger').classList.remove('open');
    }

    function setCategoryFilter(cat, btn) {
      currentCategory = cat;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      filterTasks();
    }

    function filterTasks() {
      const search = document.getElementById('searchInput').value.toLowerCase();
      const minB = Number(document.getElementById('minBudget').value) || 0;
      const maxB = Number(document.getElementById('maxBudget').value) || Infinity;
      const sort = document.getElementById('sortSelect').value;

      let filtered = allTasks.filter(t => {
        const matchCat = !currentCategory || t.category === currentCategory;
        const matchSearch = !search || t.title.toLowerCase().includes(search) || t.description.toLowerCase().includes(search);
        const matchBudget = t.budget >= minB && t.budget <= maxB;
        return matchCat && matchSearch && matchBudget;
      });

      if (sort === 'budget_high') filtered.sort((a,b) => b.budget - a.budget);
      else if (sort === 'budget_low') filtered.sort((a,b) => a.budget - b.budget);
      else filtered.sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));

      const countEl = document.getElementById('resultsCount');
      if (countEl) countEl.textContent = `Найдено: ${filtered.length}`;

      renderTasks(filtered);
    }

    function renderTasks(tasks) {
      const grid = document.getElementById('tasksGrid');
      if (!tasks.length) {
        grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
          <div class="empty-icon">🔍</div>
          <h3>Заданий не найдено</h3>
          <p>Попробуйте изменить фильтры или поисковый запрос</p>
        </div>`;
        return;
      }
      grid.innerHTML = tasks.map(renderTaskCard).join('');
    }

    function openCreateTask() {
      const user = getCurrentUser();
      if (!user) { showToast('Войдите в аккаунт', 'error'); return; }
      if (user.role !== 'client') { showToast('Только заказчики могут размещать задания', 'error'); return; }
      openModal('createTaskModal');
    }

    async function loadTasks() {
      try {
        allTasks = await api('/tasks');
        const params = new URLSearchParams(window.location.search);
        const urlCat = params.get('category');
        const urlSearch = params.get('search');

        if (urlCat) {
          currentCategory = urlCat;
          document.querySelectorAll('.filter-btn').forEach(b => {
            if (b.onclick?.toString().includes(urlCat)) b.classList.add('active');
            else b.classList.remove('active');
          });
        }
        if (urlSearch) {
          document.getElementById('searchInput').value = urlSearch;
        }
        filterTasks();
      } catch(e) {
        document.getElementById('tasksGrid').innerHTML =
          '<p style="grid-column:1/-1;text-align:center;padding:2rem;color:var(--text2)">Ошибка загрузки</p>';
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      updateNavForAuth();
      loadTasks();
      const user = getCurrentUser();
      if (user?.role === 'client') document.getElementById('createTaskBtn').style.display = 'flex';
      document.getElementById('taskDeadline').min = new Date().toISOString().split('T')[0];
      window.addEventListener('scroll', () => {
        document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 20);
      });
    });
  </script>
</body>
</html>
