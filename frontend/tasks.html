<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Задания — FreeLanceHub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css?v=20260305" />
  <style>
    .fav-btn {
      position:absolute; top:.85rem; right:.85rem; width:32px; height:32px;
      border-radius:50%; background:rgba(0,0,0,.4); backdrop-filter:blur(6px);
      border:1px solid rgba(255,255,255,.08); display:flex; align-items:center;
      justify-content:center; cursor:pointer; transition:all .18s; font-size:.9rem; z-index:2;
    }
    .fav-btn:hover  { background:rgba(239,68,68,.2); border-color:rgba(239,68,68,.3); transform:scale(1.1); }
    .fav-btn.active { background:rgba(239,68,68,.15); border-color:rgba(239,68,68,.35); }
    .task-card { position:relative; }
    .view-btn { padding:.4rem .9rem; border-radius:99px; font-size:.8rem; font-weight:600; cursor:pointer; border:1px solid var(--border); background:transparent; color:var(--text2); transition:all .16s; font-family:var(--font-body); }
    .view-btn.active { background:rgba(79,110,247,.12); border-color:rgba(79,110,247,.3); color:var(--blue-light); }

    /* FIX 5: иконка сообщения в светлой теме */
    [data-theme="light"] .notif-btn,
    [data-theme="light"] .theme-toggle {
      background: rgba(0,0,0,0.06);
      border-color: rgba(0,0,0,0.12);
      color: #0d0d22;
    }
    [data-theme="light"] .btn-ghost {
      color: #0d0d22 !important;
      background: rgba(0,0,0,0.04);
      border: 1px solid rgba(0,0,0,0.1);
    }
  </style>
</head>
<body>
  <div class="noise-overlay"></div>
  <div class="bg-canvas">
    <div class="bg-blob b1"></div>
    <div class="bg-blob b2"></div>
    <div class="bg-blob b3"></div>
    <div class="bg-blob b4"></div>
    <div class="bg-grid"></div>
  </div>

  <nav class="navbar" id="navbar">
    <a href="index.html" class="logo">
      <div class="logo-mark"><svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M10 2L17 6V14L10 18L3 14V6L10 2Z" stroke="white" stroke-width="1.5" stroke-linejoin="round"/><path d="M10 2V18M3 6L17 14M17 6L3 14" stroke="white" stroke-width="1" opacity="0.5"/></svg></div>
      <span class="logo-text">FreeLanceHub</span>
    </a>
    <ul class="nav-links">
      <li><a href="tasks.html" class="nav-link active">Задания</a></li>
      <li><a href="dashboard.html" class="nav-link">Профиль</a></li>
      <li><a href="chat.html" class="nav-link">Сообщения</a></li>
    </ul>
    <div class="nav-actions" id="navActions"></div>
    <button class="burger" id="burger" onclick="toggleMobileMenu()"><span></span><span></span><span></span></button>
  </nav>
  <div class="mobile-menu" id="mobileMenu">
    <div class="mobile-menu-inner">
      <a href="tasks.html" onclick="closeMobileMenu()">Задания</a>
      <a href="dashboard.html" onclick="closeMobileMenu()">Профиль</a>
      <a href="chat.html" onclick="closeMobileMenu()">Сообщения</a>
    </div>
  </div>

  <div class="page" style="padding-bottom:4rem;">
    <div class="container mt-3">
      <div style="margin-bottom:2rem;">
        <div class="section-eyebrow">Биржа</div>
        <div style="display:flex;justify-content:space-between;align-items:flex-end;gap:1rem;flex-wrap:wrap;">
          <h2 style="font-size:1.8rem;letter-spacing:-.04em;">Все задания</h2>
          <div style="display:flex;gap:.5rem;align-items:center;flex-wrap:wrap;">
            <div style="display:none;gap:.3rem;" id="viewToggle">
              <button class="view-btn active" onclick="setView('all',this)">Все</button>
              <button class="view-btn" onclick="setView('favorites',this)">❤️ Избранные</button>
            </div>
            <!-- FIX 6: кнопка меняется в зависимости от роли -->
            <button class="btn btn-primary" id="actionBtn" style="display:none;"></button>
          </div>
        </div>
      </div>

      <div class="filters-bar" id="filtersBar" style="flex-wrap:wrap;gap:.6rem;">
        <div class="search-bar" style="min-width:220px;">
          <input type="text" id="searchInput" placeholder="Поиск заданий..." oninput="filterTasks()" />
        </div>
        <div style="display:flex;gap:.4rem;flex-wrap:wrap;">
          <button class="filter-btn active" onclick="setCategoryFilter('',this)">Все</button>
          <button class="filter-btn" onclick="setCategoryFilter('development',this)">💻 Dev</button>
          <button class="filter-btn" onclick="setCategoryFilter('design',this)">🎨 Дизайн</button>
          <button class="filter-btn" onclick="setCategoryFilter('writing',this)">✍️ Тексты</button>
          <button class="filter-btn" onclick="setCategoryFilter('marketing',this)">📣 Маркетинг</button>
          <button class="filter-btn" onclick="setCategoryFilter('video',this)">🎬 Видео</button>
          <button class="filter-btn" onclick="setCategoryFilter('other',this)">🔧 Другое</button>
        </div>
      </div>

      <div style="display:flex;gap:.75rem;margin-bottom:1.5rem;flex-wrap:wrap;align-items:center;" id="budgetBar">
        <div style="display:flex;align-items:center;gap:.5rem;">
          <span style="font-size:.8rem;color:var(--text3);white-space:nowrap;">Бюджет:</span>
          <input type="number" class="form-control" id="minBudget" placeholder="От ₽" style="width:88px;padding:.45rem .75rem;font-size:.82rem;" oninput="filterTasks()" />
          <span style="color:var(--text3);">—</span>
          <input type="number" class="form-control" id="maxBudget" placeholder="До ₽" style="width:88px;padding:.45rem .75rem;font-size:.82rem;" oninput="filterTasks()" />
        </div>
        <!-- FIX 3: добавлен фильтр "Сначала старые" -->
        <select class="form-control" id="sortSelect" style="width:210px;padding:.45rem .75rem;font-size:.82rem;" onchange="filterTasks()">
          <option value="newest">Сначала новые</option>
          <option value="oldest">Сначала старые</option>
          <option value="budget_high">Бюджет: высокий → низкий</option>
          <option value="budget_low">Бюджет: низкий → высокий</option>
        </select>
        <div style="margin-left:auto;font-size:.8rem;color:var(--text3);" id="resultsCount"></div>
      </div>

      <div class="tasks-grid" id="tasksGrid"><div class="spinner"></div></div>
    </div>
  </div>

  <!-- CREATE TASK MODAL -->
  <div class="modal-overlay" id="createTaskModal">
    <div class="modal" style="max-width:600px;">
      <div class="modal-header">
        <h3>Новое задание</h3>
        <button class="modal-close" onclick="closeModal('createTaskModal')"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
      </div>
      <div class="form-group"><label>Название задания *</label><input type="text" class="form-control" id="taskTitle" placeholder="Разработка лендинга на React" /></div>
      <div class="form-group">
        <label>Категория *</label>
        <select class="form-control" id="taskCategory">
          <option value="">Выберите категорию</option>
          <option value="development">💻 Разработка</option>
          <option value="design">🎨 Дизайн</option>
          <option value="writing">✍️ Копирайтинг</option>
          <option value="marketing">📣 Маркетинг</option>
          <option value="video">🎬 Видео</option>
          <option value="music">🎵 Музыка</option>
          <option value="other">🔧 Другое</option>
        </select>
      </div>
      <div class="form-group"><label>Описание *</label><textarea class="form-control" id="taskDesc" style="min-height:130px;" placeholder="Подробно опишите что нужно сделать..."></textarea></div>
      <div class="grid-2">
        <div class="form-group"><label>Бюджет (₽) *</label><input type="number" class="form-control" id="taskBudget" placeholder="5000" /></div>
        <div class="form-group"><label>Дедлайн *</label><input type="date" class="form-control" id="taskDeadline" /></div>
      </div>
      <div class="form-group"><label>Навыки (через запятую)</label><input type="text" class="form-control" id="taskSkills" placeholder="React, Node.js" /></div>
      <button class="btn btn-primary w-full" id="createTaskSubmitBtn" onclick="createTask()">Разместить задание 🚀</button>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>
  <script src="js/app.js"></script>
  <script src="js/auth.js"></script>
  <script>
    let allTasks = [], favTaskIds = new Set(), currentCategory = '', currentView = 'all';

    function toggleMobileMenu() { document.getElementById('mobileMenu').classList.toggle('open'); document.getElementById('burger').classList.toggle('open'); }
    function closeMobileMenu()  { document.getElementById('mobileMenu').classList.remove('open'); document.getElementById('burger').classList.remove('open'); }

    async function loadFavoriteIds() {
      try {
        if (!getCurrentUser()) return;
        const favs = await apiAuth('/favorites');
        favTaskIds = new Set(favs.map(t => t._id));
      } catch(e) {}
    }

    async function toggleFavorite(taskId, btn, e) {
      e.stopPropagation();
      if (!getCurrentUser()) { showToast('Войдите чтобы сохранять', 'info'); return; }
      try {
        if (favTaskIds.has(taskId)) {
          await apiAuth(`/favorites/${taskId}`, { method:'DELETE' });
          favTaskIds.delete(taskId);
          btn.classList.remove('active');
          btn.innerHTML = '🤍';
          if (currentView === 'favorites') filterTasks();
          showToast('Убрано из избранного', 'info');
        } else {
          await apiAuth(`/favorites/${taskId}`, { method:'POST' });
          favTaskIds.add(taskId);
          btn.classList.add('active');
          btn.innerHTML = '❤️';
          showToast('Добавлено в избранное ❤️', 'success');
        }
      } catch(e) { showToast('Ошибка', 'error'); }
    }

    function setView(view, btn) {
      currentView = view;
      document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const show = view === 'all';
      document.getElementById('filtersBar').style.display = show ? 'flex' : 'none';
      document.getElementById('budgetBar').style.display  = show ? 'flex' : 'none';
      filterTasks();
    }

    function setCategoryFilter(cat, btn) {
      currentCategory = cat;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      filterTasks();
    }

    function filterTasks() {
      let tasks = allTasks;
      if (currentView === 'favorites') {
        tasks = allTasks.filter(t => favTaskIds.has(t._id));
        document.getElementById('resultsCount').textContent = `Избранных: ${tasks.length}`;
        renderTasks(tasks);
        return;
      }
      const search = document.getElementById('searchInput').value.toLowerCase();
      const minB = Number(document.getElementById('minBudget').value) || 0;
      const maxB = Number(document.getElementById('maxBudget').value) || Infinity;
      const sort = document.getElementById('sortSelect').value;
      let filtered = tasks.filter(t =>
        (!currentCategory || t.category === currentCategory) &&
        (!search || t.title.toLowerCase().includes(search) || t.description.toLowerCase().includes(search)) &&
        t.budget >= minB && t.budget <= maxB
      );
      // FIX 3: добавлена сортировка "oldest"
      if (sort === 'budget_high') filtered.sort((a,b) => b.budget - a.budget);
      else if (sort === 'budget_low') filtered.sort((a,b) => a.budget - b.budget);
      else if (sort === 'oldest') filtered.sort((a,b) => new Date(a.createdAt) - new Date(b.createdAt));
      else filtered.sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));
      document.getElementById('resultsCount').textContent = `Найдено: ${filtered.length}`;
      renderTasks(filtered);
    }

    function renderTasks(tasks) {
      const grid = document.getElementById('tasksGrid');
      if (!tasks.length) {
        const isFav = currentView === 'favorites';
        grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
          <div class="empty-icon">${isFav ? '❤️' : '🔍'}</div>
          <h3>${isFav ? 'Избранных нет' : 'Заданий не найдено'}</h3>
          <p>${isFav ? 'Нажми 🤍 на карточке задания чтобы сохранить' : 'Попробуйте изменить фильтры'}</p>
        </div>`;
        return;
      }
      const catEmojis = { development:'💻', design:'🎨', writing:'✍️', marketing:'📣', video:'🎬', music:'🎵', other:'🔧' };
      grid.innerHTML = tasks.map(t => {
        const isFav = favTaskIds.has(t._id);
        const deadline = new Date(t.deadline).toLocaleDateString('ru-RU');
        return `
          <div class="task-card" onclick="window.location.href='task-detail.html?id=${t._id}'">
            <button class="fav-btn ${isFav?'active':''}" onclick="toggleFavorite('${t._id}',this,event)" title="${isFav?'Убрать из избранного':'В избранное'}">${isFav?'❤️':'🤍'}</button>
            <div class="task-card-header">
              <h3>${t.title}</h3>
              <span class="task-budget">₽${t.budget.toLocaleString()}</span>
            </div>
            <p class="task-desc">${t.description}</p>
            <div style="display:flex;flex-wrap:wrap;gap:.35rem;margin-top:.75rem;">
              <span class="badge badge-${t.category}">${catEmojis[t.category]||'🔧'} ${t.category}</span>
              ${t.skills?.slice(0,2).map(s=>`<span class="skill-tag">${s}</span>`).join('')||''}
            </div>
            <div style="display:flex;justify-content:space-between;align-items:center;margin-top:.85rem;padding-top:.75rem;border-top:1px solid var(--border);">
              <div style="display:flex;align-items:center;gap:.5rem;">
                <div class="avatar" style="width:22px;height:22px;font-size:.55rem;">
                  ${t.client?.avatar?`<img src="${t.client.avatar}" style="width:22px;height:22px;border-radius:50%;object-fit:cover;">`:(t.client?.name||'?').charAt(0)}
                </div>
                <span style="font-size:.78rem;color:var(--text3);">${t.client?.name||'Аноним'}</span>
              </div>
              <span style="font-size:.75rem;color:var(--text3);">⏰ ${deadline}</span>
            </div>
          </div>`;
      }).join('');
    }

    function openCreateTask() {
      const user = getCurrentUser();
      if (!user) { showToast('Войдите в аккаунт', 'error'); return; }
      if (user.role !== 'client') { showToast('Только заказчики могут размещать задания', 'error'); return; }
      openModal('createTaskModal');
    }

    async function createTask() {
      const title    = document.getElementById('taskTitle').value.trim();
      const category = document.getElementById('taskCategory').value;
      const desc     = document.getElementById('taskDesc').value.trim();
      const budget   = Number(document.getElementById('taskBudget').value);
      const deadline = document.getElementById('taskDeadline').value;
      const skills   = document.getElementById('taskSkills').value.split(',').map(s => s.trim()).filter(Boolean);

      if (!title)    { showToast('Введите название задания', 'error'); return; }
      if (!category) { showToast('Выберите категорию', 'error'); return; }
      if (!desc)     { showToast('Введите описание', 'error'); return; }
      if (!budget || budget <= 0) { showToast('Введите корректный бюджет', 'error'); return; }
      if (!deadline) { showToast('Укажите дедлайн', 'error'); return; }

      const btn = document.getElementById('createTaskSubmitBtn');
      btn.disabled = true; btn.textContent = 'Размещаем...';

      try {
        const task = await apiAuth('/tasks', {
          method: 'POST',
          body: JSON.stringify({ title, category, description: desc, budget, deadline, skills })
        });
        closeModal('createTaskModal');
        showToast('Задание размещено! 🚀', 'success');
        allTasks.unshift(task);
        filterTasks();
      } catch(e) {
        showToast(e.message || 'Ошибка при создании задания', 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Разместить задание 🚀';
      }
    }

    async function loadTasks() {
      try {
        allTasks = await api('/tasks');
        await loadFavoriteIds();
        const params = new URLSearchParams(window.location.search);
        if (params.get('category')) {
          currentCategory = params.get('category');
          document.querySelectorAll('.filter-btn').forEach(b => {
            b.classList.toggle('active', b.textContent.toLowerCase().includes(currentCategory));
          });
        }
        if (params.get('search')) document.getElementById('searchInput').value = params.get('search');
        filterTasks();

        if (params.get('action') === 'create') {
          const user = getCurrentUser();
          if (user && user.role === 'client') {
            setTimeout(() => openCreateTask(), 400);
          } else if (user && user.role === 'freelancer') {
            showToast('Фрилансеры не могут размещать задания', 'info');
          } else {
            window.location.href = 'index.html';
          }
        }
      } catch(e) {
        document.getElementById('tasksGrid').innerHTML = '<p style="grid-column:1/-1;text-align:center;padding:2rem;color:var(--text2)">Ошибка загрузки</p>';
      }
    }

    function openAuthModal() { window.location.href = 'index.html'; }

    document.addEventListener('DOMContentLoaded', () => {
      updateNavForAuth();
      loadTasks();
      const user = getCurrentUser();
      if (user) {
        document.getElementById('viewToggle').style.display = 'flex';
        const actionBtn = document.getElementById('actionBtn');
        // FIX 6: разные кнопки для клиента и фрилансера
        if (user.role === 'client') {
          actionBtn.style.display = 'flex';
          actionBtn.textContent = '+ Разместить заказ';
          actionBtn.onclick = openCreateTask;
        } else if (user.role === 'freelancer') {
          actionBtn.style.display = 'flex';
          actionBtn.textContent = '+ Добавить услугу';
          actionBtn.onclick = () => {
            sessionStorage.setItem('pendingAction', 'addService');
            window.location.href = 'profile.html';
          };
        }
      }
      document.getElementById('taskDeadline').min = new Date().toISOString().split('T')[0];
      window.addEventListener('scroll', () => document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 20));
    });
  </script>
</body>
</html>
