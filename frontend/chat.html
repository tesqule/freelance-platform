<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Чат — FreeLanceHub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .chat-empty-state {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; height: 100%; text-align: center;
    }
    #convSearch:focus { border-color: var(--blue); box-shadow: 0 0 0 2px rgba(79,110,247,.1); }
    @media (max-width: 900px) {
      .chat-layout { grid-template-columns: 1fr; }
      .chat-sidebar { display: flex; height: calc(100vh - var(--nav-h)); border-right: none; border-bottom: 1px solid var(--border); }
      .chat-main { height: calc(100vh - var(--nav-h)); }
      body.chat-open .chat-sidebar { display: none; }
      body.chat-open .chat-main { display: flex; }
    }
  </style>
</head>
<body>

  <div class="noise-overlay"></div>
  <div class="bg-canvas">
    <div class="bg-blob b1"></div>
    <div class="bg-blob b2"></div>
    <div class="bg-blob b3"></div>
    <div class="bg-blob b4"></div>
    <div class="bg-grid"></div>
  </div>

  <nav class="navbar" id="navbar">
    <a href="index.html" class="logo">
      <div class="logo-mark">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M10 2L17 6V14L10 18L3 14V6L10 2Z" stroke="white" stroke-width="1.5" stroke-linejoin="round"/><path d="M10 2V18M3 6L17 14M17 6L3 14" stroke="white" stroke-width="1" opacity="0.5"/></svg>
      </div>
      <span class="logo-text">FreeLanceHub</span>
    </a>
    <ul class="nav-links">
      <li><a href="tasks.html" class="nav-link">Задания</a></li>
      <li><a href="dashboard.html" class="nav-link">Дашборд</a></li>
      <li><a href="chat.html" class="nav-link active">Сообщения</a></li>
    </ul>
    <div class="nav-actions" id="navActions"></div>
    <button class="burger" id="burger" onclick="toggleMobileMenu()"><span></span><span></span><span></span></button>
  </nav>

  <div class="mobile-menu" id="mobileMenu">
    <div class="mobile-menu-inner">
      <a href="tasks.html" onclick="closeMobileMenu()">Задания</a>
      <a href="dashboard.html" onclick="closeMobileMenu()">Дашборд</a>
      <a href="chat.html" onclick="closeMobileMenu()">Сообщения</a>
    </div>
  </div>

  <div class="chat-layout">
    <div class="chat-sidebar" id="chatSidebar">
      <div class="chat-sidebar-header">
        <div style="display:flex;align-items:center;gap:.6rem;">
          <span style="font-size:1.1rem;">💬</span>
          <span>Сообщения</span>
        </div>
      </div>
      <div style="padding:.75rem 1rem;border-bottom:1px solid var(--border);">
        <div style="position:relative;">
          <input type="text" id="convSearch" placeholder="Поиск..." style="
            width:100%;background:var(--surface);border:1px solid var(--border);
            border-radius:99px;padding:.42rem .9rem .42rem 2rem;
            font-family:var(--font-body);font-size:.8rem;color:var(--text);outline:none;
          " oninput="filterConversations(this.value)" />
          <span style="position:absolute;left:.7rem;top:50%;transform:translateY(-50%);color:var(--text3);font-size:.85rem;pointer-events:none;">⌕</span>
        </div>
      </div>
      <div id="conversationsList">
        <div style="padding:2rem;text-align:center;color:var(--text3);font-size:.85rem;">Загрузка...</div>
      </div>
    </div>

    <div class="chat-main" id="chatMain">
      <div class="chat-empty-state">
        <div style="font-size:3rem;margin-bottom:.75rem;opacity:.4;">💬</div>
        <div style="font-size:.95rem;color:var(--text3);font-weight:500;">Выберите диалог</div>
        <div style="font-size:.8rem;color:var(--text3);margin-top:.3rem;">или начните новый из карточки задания</div>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.1/socket.io.min.js"></script>
  <script src="js/app.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/chat.js"></script>
  <script>
    function toggleMobileMenu() {
      document.getElementById('mobileMenu').classList.toggle('open');
      document.getElementById('burger').classList.toggle('open');
    }
    function closeMobileMenu() {
      document.getElementById('mobileMenu').classList.remove('open');
      document.getElementById('burger').classList.remove('open');
    }

    document.addEventListener('DOMContentLoaded', () => {
      const user = getCurrentUser();
      if (!user) { window.location.href = 'index.html'; return; }
      updateNavForAuth();
      initChat();
      const targetUser = new URLSearchParams(window.location.search).get('user');
      if (targetUser) openChatWith(targetUser);
      window.addEventListener('scroll', () => {
        document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 20);
      });
    });
  </script>
</body>
</html>
